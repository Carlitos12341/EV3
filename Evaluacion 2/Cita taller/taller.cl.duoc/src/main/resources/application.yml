server:
  port: ${PORT:8080}

spring:
  application:
    name: ms-cita
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/bd_taller?createDatabaseIfNotExist=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    hikari:
      maximum-pool-size: 2
      minimum-idle: 1
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

ms-mecanico:
  url: ${MS_MECANICO_URL:http://localhost:8084}

ms-notificacion:
  url: ${MS_NOTIFICACION_URL:http://localhost:8085}

springdoc:
  swagger-ui:
    path: /doc/swagger-ui.html
