envVarGroups:
  - name: taller-db
    envVars:
      # Base de datos MySQL externa (Aiven / Railway / Clever Cloud / etc.).
      # Render no ofrece MySQL gestionado, por eso se completa a mano en el dashboard
      # la primera vez que se crea el Blueprint (Environment Group "taller-db").
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false

services:
  - name: taller-ms-cita
    type: web
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: "./Evaluacion 2/Cita taller/taller.cl.duoc/Dockerfile"
    dockerContext: "./Evaluacion 2/Cita taller/taller.cl.duoc"
    healthCheckPath: /doc/swagger-ui.html
    envVars:
      - fromGroup: taller-db
      - key: MS_MECANICO_URL
        value: https://taller-ms-mecanico.onrender.com
      - key: MS_NOTIFICACION_URL
        value: https://taller-ms-notificacion.onrender.com

  - name: taller-ms-cliente
